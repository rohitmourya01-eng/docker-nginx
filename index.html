<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blue Login Page</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1d4ed8, #38bdf8);
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .left-side {
      background: linear-gradient(160deg, #0f172a, #1e3a8a);
      color: white;
      padding: 50px 35px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left-side h1 {
      font-size: 38px;
      margin-bottom: 15px;
    }

    .left-side p {
      color: #dbeafe;
      line-height: 1.7;
      margin-bottom: 25px;
    }

    .social-icons {
      display: flex;
      gap: 15px;
    }

    .social-icons a {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: white;
      background: rgba(255, 255, 255, 0.15);
      font-size: 20px;
      transition: 0.3s ease;
    }

    .social-icons a:hover {
      background: #60a5fa;
      transform: translateY(-4px);
    }

    .right-side {
      background: white;
      padding: 40px 30px;
    }

    .tabs {
      display: flex;
      background: #e0f2fe;
      border-radius: 50px;
      padding: 5px;
      margin-bottom: 30px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      color: #1e3a8a;
      transition: 0.3s;
    }

    .tab-btn.active {
      background: #2563eb;
      color: white;
    }

    .form-box {
      display: none;
    }

    .form-box.active {
      display: block;
    }

    .form-box h2 {
      color: #1e3a8a;
      margin-bottom: 20px;
    }

    .input-box {
      margin-bottom: 18px;
    }

    .input-box input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      outline: none;
      font-size: 15px;
    }

    .input-box input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #2563eb, #0ea5e9);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
    }

    .note {
      margin-top: 14px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }

      .left-side,
      .right-side {
        padding: 30px 20px;
      }

      .left-side h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="left-side">
      <h1>Welcome</h1>
      <p>
        This is a blue theme login and sign in page. Click the icons below to open
        YouTube and Facebook home pages.
      </p>

      <div class="social-icons">
        <a href="https://www.youtube.com/" target="_blank" title="YouTube">
          <i class="fa-brands fa-youtube"></i>
        </a>
        <a href="https://www.facebook.com/" target="_blank" title="Facebook">
          <i class="fa-brands fa-facebook-f"></i>
        </a>
      </div>
    </div>

    <div class="right-side">
      <div class="tabs">
        <button class="tab-btn active" onclick="showForm('login')">Login</button>
        <button class="tab-btn" onclick="showForm('signin')">Sign In</button>
      </div>

      <div id="login" class="form-box active">
        <h2>Login</h2>
        <div class="input-box">
          <input type="email" placeholder="Enter your email">
        </div>
        <div class="input-box">
          <input type="password" placeholder="Enter your password">
        </div>
        <button class="submit-btn" onclick="goHome()">Login</button>
        <p class="note">After login, it will redirect to home page.</p>
      </div>

      <div id="signin" class="form-box">
        <h2>Sign In</h2>
        <div class="input-box">
          <input type="text" placeholder="Enter your full name">
        </div>
        <div class="input-box">
          <input type="email" placeholder="Enter your email">
        </div>
        <div class="input-box">
          <input type="password" placeholder="Create password">
        </div>
        <button class="submit-btn" onclick="goHome()">Sign In</button>
        <p class="note">After sign in, it will redirect to home page.</p>
      </div>
    </div>
  </div>

  <script>
    function showForm(formId) {
      const forms = document.querySelectorAll('.form-box');
      const tabs = document.querySelectorAll('.tab-btn');

      forms.forEach(form => form.classList.remove('active'));
      tabs.forEach(tab => tab.classList.remove('active'));

      document.getElementById(formId).classList.add('active');

      if (formId === 'login') {
        tabs[0].classList.add('active');
      } else {
        tabs[1].classList.add('active');
      }
    }

    function goHome() {
      window.location.href = "home.html";
    }
  </script>

</body>
</html>
